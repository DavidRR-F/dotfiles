---
general:
  focus_follows_cursor: false

  cursor_follows_focus: false

  toggle_workspace_on_refocus: true

  show_floating_on_top: false

  floating_window_move_amount: 5%

  center_new_floating_windows: true

  window_animations: unchanged
gaps:
  inner_gap: 0px
  outer_gap: 0px
focus_borders:
  active:
    enabled: true
    color: '#a6e3a1'
  inactive:
    enabled: false
    color: '#b4befe'
bar:
  height: 30px
  position: bottom
  opacity: 0.8 
  background: '#1e1e2e'
  foreground: '#cdd6f4'
  font_family: 0xProto Nerd Font Mono
  font_size: 13px
  padding: 4px 6px
  offset_x: '0'
  offset_y: '0'
  border_radius: '0'
  components_left:
    - type: workspaces
      focused_workspace_background: '#313244'
      displayed_workspace_background: '#1e1e2e'
      default_workspace_background: transparent
  components_center:
    - type: window title
  components_right:
    - type: "network"
      label_no_internet: "NC"
      label_ethernet: "Eth"
      label_wifi_strength_0: "WiFi: 0%"
      label_wifi_strength_25: "WiFi: 25%"
      label_wifi_strength_50: "WiFi: 50%"
      label_wifi_strength_75: "WiFi: 75%"
      label_wifi_strength_100: "WiFi: 100%"
      margin: 2px 0 0 0
      padding: 0 8px
    - type: clock
      time_formatting: hh:mm tt ddd MMM d
workspaces:
  - name: '1'
    bind_to_monitor: 1
  - name: '2'
    bind_to_monitor: 1
  - name: '3'
    bind_to_monitor: 1
  - name: '4'
    bind_to_monitor: 2
  - name: '5'
    bind_to_monitor: 2
  - name: '6'
    bind_to_monitor: 2
  - name: '7'
    bind_to_monitor: 3
  - name: '8'
    bind_to_monitor: 3
  - name: '9'
    bind_to_monitor: 3
window_rules:
  - command: "ignore"
    match_title: "Snipping Tool"

  - command: "ignore"
    match_title: "Screen Snipping"

  - command: ignore
    match_process_name: /Taskmgr|ScreenClippingHost/

  - command: set floating
    match_class_name: '#32770'

  - command: ignore
    match_title: '[Pp]icture.in.[Pp]icture'
    match_class_name: Chrome_WidgetWin_1|MozillaDialogClass

  - command: resize borders 0px -7px -7px -7px
    match_process_name: steam
binding_modes:
  - name: resize
    keybindings:
      - command: resize width -2%
        bindings:
          - H
          - Left
      - command: resize width +2%
        bindings:
          - L
          - Right
      - command: resize height +2%
        bindings:
          - K
          - Up
      - command: resize height -2%
        bindings:
          - J
          - Down
      - command: binding mode none
        bindings:
          - Escape
          - Enter
keybindings:
  - command: focus left
    bindings:
      - Alt+H
      - Alt+Left
  - command: focus right
    bindings:
      - Alt+L
      - Alt+Right
  - command: focus up
    bindings:
      - Alt+K
      - Alt+Up
  - command: focus down
    bindings:
      - Alt+J
      - Alt+Down

  - command: move left
    bindings:
      - Alt+Shift+H
      - Alt+Shift+Left
  - command: move right
    bindings:
      - Alt+Shift+L
      - Alt+Shift+Right
  - command: move up
    bindings:
      - Alt+Shift+K
      - Alt+Shift+Up
  - command: move down
    bindings:
      - Alt+Shift+J
      - Alt+Shift+Down

  - command: resize width -2%
    binding: Alt+U
  - command: resize width +2%
    binding: Alt+P
  - command: resize height +2%
    binding: Alt+O
  - command: resize height -2%
    binding: Alt+I

  - command: binding mode resize
    binding: Alt+R

  - command: tiling direction toggle
    binding: Alt+V

  - command: focus mode toggle
    binding: Alt+Space

  - command: toggle floating
    binding: Alt+Shift+Space

  - command: toggle maximized
    binding: Alt+X

  - command: set minimized
    binding: Alt+M

  - command: close
    binding: Alt+Shift+Q

  - command: exit wm
    binding: Alt+Shift+E

  - command: reload config
    binding: Alt+Shift+R

  - command: exec wt
    binding: Alt+Enter

  - command: focus workspace recent
    binding: Alt+Y

  - command: focus workspace next
    binding: Alt+T
  - command: focus workspace prev
    binding: Alt+Shift+T

  - command: focus workspace 1
    binding: Alt+1
  - command: focus workspace 2
    binding: Alt+2
  - command: focus workspace 3
    binding: Alt+3
  - command: focus workspace 4
    binding: Alt+4
  - command: focus workspace 5
    binding: Alt+5
  - command: focus workspace 6
    binding: Alt+6
  - command: focus workspace 7
    binding: Alt+7
  - command: focus workspace 8
    binding: Alt+8
  - command: focus workspace 9
    binding: Alt+9

  - commands:
      - move to workspace 1
      - focus workspace 1
    binding: Alt+Shift+1
  - commands:
      - move to workspace 2
      - focus workspace 2
    binding: Alt+Shift+2
  - commands:
      - move to workspace 3
      - focus workspace 3
    binding: Alt+Shift+3
  - commands:
      - move to workspace 4
      - focus workspace 4
    binding: Alt+Shift+4
  - commands:
      - move to workspace 5
      - focus workspace 5
    binding: Alt+Shift+5
  - commands:
      - move to workspace 6
      - focus workspace 6
    binding: Alt+Shift+6
  - commands:
      - move to workspace 7
      - focus workspace 7
    binding: Alt+Shift+7
  - commands:
      - move to workspace 8
      - focus workspace 8
    binding: Alt+Shift+8
  - commands:
      - move to workspace 9
      - focus workspace 9
    bindings:
      - Alt+Shift+9
